syntax = "proto3";

package inch.v1;

option go_package = "inch/v1";

import "google/protobuf/timestamp.proto";
import "inch/v1/event.proto";

// Alert represents a security alert generated by the rule engine.
message Alert {
  // Unique alert identifier.
  string alert_id = 1;

  // Rule that triggered this alert.
  string rule_id = 2;

  // Human-readable rule name.
  string rule_name = 3;

  // Alert severity (determined by the rule).
  Severity severity = 4;

  // When the alert was generated.
  google.protobuf.Timestamp created_at = 5;

  // Description of what triggered the alert.
  string description = 6;

  // The group key (e.g., source_ip value that triggered the rule).
  map<string, string> group_values = 7;

  // Number of events that contributed to this alert.
  uint32 event_count = 8;

  // IDs of contributing events.
  repeated string event_ids = 9;

  // Tags applied by the rule engine.
  repeated string tags = 10;

  // Enrichment data (GeoIP, threat intel, etc.).
  map<string, string> enrichment = 11;
}

// AlertBatch groups multiple alerts for transport.
message AlertBatch {
  repeated Alert alerts = 1;
}
