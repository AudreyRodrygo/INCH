---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "inch.fullname" . }}-alertmgr
  labels:
    {{- include "inch.labels" . | nindent 4 }}
    app.kubernetes.io/component: alertmgr
spec:
  replicas: {{ .Values.alertManager.replicas }}
  selector:
    matchLabels:
      {{- include "inch.selectorLabels" (dict "name" "alertmgr" "root" .) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "inch.selectorLabels" (dict "name" "alertmgr" "root" .) | nindent 8 }}
    spec:
      containers:
        - name: alertmgr
          image: {{ include "inch.image" (dict "cfg" .Values.alertManager "root" .) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.alertManager.port }}
              protocol: TCP
          env:
            - name: ALERTMGR_NATS_URL
              value: {{ .Values.alertManager.config.natsUrl | quote }}
            - name: ALERTMGR_POSTGRES_URL
              value: {{ .Values.alertManager.config.postgresUrl | quote }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.alertManager.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "inch.fullname" . }}-alertmgr
  labels:
    {{- include "inch.labels" . | nindent 4 }}
    app.kubernetes.io/component: alertmgr
spec:
  type: ClusterIP
  selector:
    {{- include "inch.selectorLabels" (dict "name" "alertmgr" "root" .) | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.alertManager.port }}
      targetPort: http
      protocol: TCP
