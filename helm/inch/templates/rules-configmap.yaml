---
# Correlation rules are mounted into the processor as a ConfigMap.
# Hot reload: processor watches the mounted path — update the ConfigMap
# and rules are reloaded without a pod restart.
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "inch.fullname" . }}-rules
  labels:
    {{- include "inch.labels" . | nindent 4 }}
    app.kubernetes.io/component: processor
data:
  brute_force.yaml: |
    # Loaded from inch/rules/brute_force.yaml at deploy time.
    # Override with --set-file or a values file in CI.
    {}
  lateral_movement.yaml: |
    {}
  tor_access.yaml: |
    {}
